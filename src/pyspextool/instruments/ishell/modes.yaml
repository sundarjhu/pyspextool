# iSHELL mode registry
# Supported J/H/K modes only.  L/Lp/M are not yet implemented.
#
# Fields:
#   family         - spectral family (J, H, or K)
#   wavecal_method - wavelength-calibration strategy (thar = ThAr arc lamp)
#   line_list      - arc-line list file (relative to the data/ sub-package)
#   flatinfo       - flat-field calibration FITS file
#   wavecalinfo    - wavelength-calibration FITS file

J0:
  family: J
  wavecal_method: thar
  line_list: J0_lines.dat
  flatinfo: J0_flatinfo.fits
  wavecalinfo: J0_wavecalinfo.fits

J1:
  family: J
  wavecal_method: thar
  line_list: J1_lines.dat
  flatinfo: J1_flatinfo.fits
  wavecalinfo: J1_wavecalinfo.fits

